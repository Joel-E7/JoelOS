<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JE OS">
<title>JE — OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23080808' width='100' height='100'/><text x='50' y='75' font-size='60' font-weight='bold' text-anchor='middle' fill='%23c8a96e' font-family='Arial'>J</text></svg>">
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:#101010;--surface2:#161616;--surface3:#1c1c1c;
  --border:#1e1e1e;--border2:#272727;--border3:#303030;
  --text:#e4e0d8;--muted:#4a4a4a;--muted2:#333;--soft:#888;
  --gold:#c8a96e;--gold-dim:#6b5530;--gold-bg:#1a1508;
  --green:#4caf7d;--green-bg:#0e1f14;
  --red:#e05a5a;--blue:#5b8dee;
  --sidebar-w:220px;
  --font-h:'Syne',sans-serif;--font-m:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--font-m);min-height:100vh;line-height:1.5;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

/* ── AUTH ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-wrap{width:100%;max-width:340px;}
.auth-logo{font-family:var(--font-h);font-size:3rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:2px;}
.auth-logo span{color:var(--gold);}
.auth-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px;}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:26px;}
.auth-card h2{font-family:var(--font-h);font-size:1rem;font-weight:700;margin-bottom:3px;}
.auth-card p{font-size:0.7rem;color:var(--soft);margin-bottom:22px;line-height:1.6;}
.btn-google{width:100%;background:#fff;border:none;border-radius:7px;color:#111;font-family:var(--font-m);font-size:0.76rem;font-weight:500;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity 0.15s;}
.btn-google:hover{opacity:0.9;}
#auth-err{font-size:0.7rem;color:var(--red);margin-top:10px;text-align:center;min-height:14px;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;}
.app-layout{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:width 0.25s cubic-bezier(0.4,0,0.2,1),transform 0.25s cubic-bezier(0.4,0,0.2,1);}
.sidebar.collapsed{width:52px;}
.sidebar.collapsed .logo-sub,.sidebar.collapsed .uname,.sidebar.collapsed .sync-dot,.sidebar.collapsed .nav-section-label,.sidebar.collapsed .ni-label,.sidebar.collapsed .sidebar-bottom .btn{display:none;}
.sidebar.collapsed .streak-pill,.sidebar.collapsed .reading-streak-pill{flex-direction:column;align-items:center;gap:2px;padding:7px 6px;}
.sidebar.collapsed .streak-num,.sidebar.collapsed .rs-num{font-size:1rem;}
.sidebar.collapsed .streak-info,.sidebar.collapsed .rs-info{display:none;}
.sidebar.collapsed .sidebar-bottom{flex-direction:column;gap:6px;align-items:center;padding:10px 6px;}
.sidebar.collapsed .sidebar-logo{padding:16px 14px;}
.sidebar.collapsed .logo{font-size:1rem;}
.sidebar.collapsed .sidebar-user{padding:12px 14px;justify-content:center;}
.sidebar.collapsed .uav{margin:0;}
.sidebar.collapsed .nav-item{padding:10px;justify-content:center;}
.sidebar.collapsed .ni-icon{width:auto;font-size:1rem;}
.sidebar.collapsed .nav-section{margin-bottom:10px;}
.sidebar.collapsed .sidebar-bottom{padding:10px;display:flex;justify-content:center;}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-h);font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;}
.logo span{color:var(--gold);}
.logo-sub{font-size:0.56rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
.sidebar-user{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;}
.sidebar-user:hover .uname{color:var(--text);}
.uav{width:24px;height:24px;border-radius:50%;background:var(--gold-dim);object-fit:cover;flex-shrink:0;}
.uname{font-size:0.68rem;color:var(--soft);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted2);transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--gold);animation:blink 0.8s infinite;}
.sync-dot.synced{background:var(--green);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{margin-bottom:18px;}
.nav-section-label{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all 0.15s;color:var(--soft);font-size:0.73rem;border:1px solid transparent;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim);}
.nav-item .ni-icon{font-size:0.9rem;width:16px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;}
.sidebar-bottom{padding:12px 10px;border-top:1px solid var(--border);}
.streak-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:7px;}
.streak-num{font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-0.02em;}
.streak-info{font-size:0.62rem;color:var(--soft);line-height:1.5;}
.streak-info strong{color:var(--gold);display:block;font-size:0.65rem;}

/* ── MAIN CONTENT ── */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;transition:margin-left 0.25s cubic-bezier(0.4,0,0.2,1);}
.sidebar.collapsed~.main,.sidebar.collapsed+.main{margin-left:52px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.hamburger{background:none;border:none;color:var(--soft);cursor:pointer;font-size:1.1rem;padding:4px;transition:color 0.15s;display:block;}
.hamburger:hover{color:var(--text);}
.page-title{font-family:var(--font-h);font-size:1rem;font-weight:700;color:var(--text);}
.page-title span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-pill{font-size:0.65rem;color:var(--muted);}
.date-pill strong{color:var(--soft);display:block;font-size:0.72rem;}
#install-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.62rem;padding:4px 9px;cursor:pointer;transition:all 0.15s;display:none;}
#install-btn:hover{color:var(--gold);border-color:var(--gold-dim);}
.content{padding:24px 28px 80px;}

/* ── LAYOUT GROUPS ── */
.section-group{margin-bottom:32px;}
.section-label{font-family:var(--font-h);font-size:0.8rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0 0 12px 0;margin-bottom:12px;border-bottom:1px solid var(--border);}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:12px;}
.card-title{font-family:var(--font-h);font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.empty{color:var(--soft);font-size:0.72rem;padding:8px 0;font-style:italic;}
.mini-prompt{color:var(--soft);font-size:0.7rem;padding:6px;background:var(--surface2);border-radius:4px;margin-bottom:8px;border-left:2px solid var(--gold-dim);}

/* ── SPARKLINES ── */
.sparkline-container{display:flex;align-items:flex-end;gap:1px;height:28px;margin-top:4px;}
.sparkline-bar{flex:1;background:var(--gold);border-radius:1px;min-width:2px;}
.sparkline-bar.green{background:var(--green);}

/* ── GRID ── */
.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;}

/* ── OVERLAY ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
#sidebar-overlay.show{display:block;}

/* ── SUNDAY BANNER ── */
.sunday-banner{display:none;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--gold-dim);border-radius:8px;padding:11px 14px;margin-bottom:16px;}
.sunday-banner.show{display:flex;}
.sunday-banner .sb-text{font-size:0.72rem;color:var(--soft);line-height:1.5;flex:1;}
.sunday-banner .sb-text strong{color:var(--gold);display:block;}

/* ── FORMS ── */
input[type="date"],input[type="text"],input[type="number"],select,textarea{width:100%;padding:6px 8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:var(--font-m);font-size:0.73rem;margin-bottom:6px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:var(--surface3);}
button{cursor:pointer;transition:all 0.15s;}
.btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.73rem;padding:6px 12px;}
.btn:hover{background:var(--surface3);color:var(--text);}
.btn-gold{background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);font-family:var(--font-m);font-size:0.73rem;padding:6px 12px;border-radius:6px;}
.btn-gold:hover{background:var(--gold);color:var(--bg);}
.btn-x{background:none;border:none;color:var(--muted);padding:4px;font-size:0.8rem;cursor:pointer;}
.btn-x:hover{color:var(--red);}

/* ── MODAL ── */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.modal-content{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;}
.modal-content h3{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:14px;color:var(--text);}
.lbl{font-size:0.7rem;color:var(--soft);display:block;margin-bottom:4px;}
.del-confirm{font-size:0.72rem;color:var(--soft);display:flex;gap:8px;align-items:center;}
.del-yes,.del-no{background:none;border:none;color:var(--gold);font-family:var(--font-m);font-size:0.65rem;cursor:pointer;padding:2px 4px;}
.del-no{color:var(--soft);}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .topbar{padding:12px 16px;}
  .content{padding:16px;}
  .page-title{font-size:0.9rem;}
  #install-btn{display:none!important;}
}

@media(min-width:901px) and (max-width:1200px){
  .ga{grid-template-columns:1fr 1fr;}
}

.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:12px 16px;font-size:0.7rem;color:var(--soft);z-index:300;animation:slideIn 0.3s;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">JE<span>.</span></div>
    <div class="auth-sub">Personal Operating System</div>
    <div class="auth-card">
      <h2>Sign in</h2>
      <p>Syncs across all devices in real time.</p>
      <button class="btn-google" onclick="window.doSignIn()">
        <svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div id="auth-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo">JE<span>.</span></div>
        <div class="logo-sub">Personal OS</div>
      </div>
      <div class="sidebar-user" onclick="window.doSignOut()">
        <img id="uav" class="uav" src="" onerror="this.style.display='none'">
        <span id="uname" class="uname">—</span>
        <div class="sync-dot" id="sync-status"></div>
        <div id="offline-badge" style="display:none;font-size:0.55rem;background:var(--red);color:#fff;border-radius:3px;padding:1px 4px;flex-shrink:0;">OFFLINE</div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Daily</div>
          <div class="nav-item active" onclick="nav('today')">
            <span class="ni-icon">📅</span>
            <span class="ni-label">Today</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Weekly</div>
          <div class="nav-item" onclick="nav('review')">
            <span class="ni-icon">📊</span>
            <span class="ni-label">Review</span>
          </div>
          <div class="nav-item" onclick="nav('energy')">
            <span class="ni-icon">⚡</span>
            <span class="ni-label">Energy Map</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Projects</div>
          <div class="nav-item" onclick="nav('padel')">
            <span class="ni-icon">🎾</span>
            <span class="ni-label">Padel</span>
          </div>
          <div class="nav-item" onclick="nav('workout')">
            <span class="ni-icon">🏋️</span>
            <span class="ni-label">Workout</span>
          </div>
          <div class="nav-item" onclick="nav('uni')">
            <span class="ni-icon">📚</span>
            <span class="ni-label">Uni Log</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Reflect</div>
          <div class="nav-item" onclick="nav('journal')">
            <span class="ni-icon">✍</span>
            <span class="ni-label">Journal</span>
          </div>
          <div class="nav-item" onclick="nav('priorities')">
            <span class="ni-icon">⭐</span>
            <span class="ni-label">Priorities</span>
          </div>
          <div class="nav-item" onclick="nav('habits')">
            <span class="ni-icon">🔗</span>
            <span class="ni-label">Habits</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Data</div>
          <div class="nav-item" onclick="nav('stats')">
            <span class="ni-icon">📈</span>
            <span class="ni-label">Stats</span>
          </div>
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="streak-pill">
          <div class="streak-num" id="main-streak">0</div>
          <div class="streak-info">Day<br><strong>Streak</strong></div>
        </div>
        <div class="streak-pill" style="background:var(--surface2);border-color:var(--border2);position:relative;">
          <div class="streak-num" style="color:var(--gold);" id="read-streak">0</div>
          <div class="streak-info">Reading<br><strong>Days</strong></div>
          <button onclick="resetReadingStreak()" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;padding:2px 4px;border-radius:2px;transition:all 0.15s;" title="Reset streak" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">↻</button>
        </div>
        <div class="streak-pill" style="background:var(--surface2);border-color:var(--border2);">
          <div class="streak-num" style="color:var(--green);" id="padel-streak">0</div>
          <div class="streak-info">Padel<br><strong>Weeks</strong></div>
        </div>
        <div style="position:relative;">
          <button class="btn" onclick="toggleExportMenu()" style="width:100%;">⬇ Export</button>
          <div id="export-menu" style="display:none;position:absolute;bottom:110%;left:0;right:0;background:var(--surface);border:1px solid var(--border2);border-radius:6px;overflow:hidden;z-index:50;">
            <button class="btn" onclick="window.doExportAll()" style="width:100%;border:none;border-radius:0;border-bottom:1px solid var(--border);text-align:left;padding:8px 10px;">📦 Full JSON backup</button>
            <button class="btn" onclick="window.doExportCSV('daily')" style="width:100%;border:none;border-radius:0;border-bottom:1px solid var(--border);text-align:left;padding:8px 10px;">📅 Daily data (CSV)</button>
            <button class="btn" onclick="window.doExportCSV('exercises')" style="width:100%;border:none;border-radius:0;border-bottom:1px solid var(--border);text-align:left;padding:8px 10px;">🏋️ Exercises (CSV)</button>
            <button class="btn" onclick="window.doExportCSV('padel')" style="width:100%;border:none;border-radius:0;border-bottom:1px solid var(--border);text-align:left;padding:8px 10px;">🎾 Padel (CSV)</button>
            <button class="btn" onclick="window.doExportCSV('uni_log')" style="width:100%;border:none;border-radius:0;border-bottom:1px solid var(--border);text-align:left;padding:8px 10px;">📚 Uni log (CSV)</button>
            <button class="btn" onclick="window.doExportCSV('journal')" style="width:100%;border:none;border-radius:0;text-align:left;padding:8px 10px;">✍ Journal (CSV)</button>
          </div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <h1 class="page-title" id="page-title">Today</h1>
        </div>
        <div class="topbar-right">
          <button id="yesterday-btn" onclick="toggleYesterday()" style="background:none;border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.65rem;padding:4px 8px;cursor:pointer;transition:all 0.15s;">←</button>
          <div class="date-pill"><strong id="top-date">—</strong><span id="top-time">—</span></div>
          <button id="install-btn" onclick="window.installPWA()">Install</button>
        </div>
      </div>
      <div class="content" id="content"></div>
    </main>

  </div>
</div>

<!-- MODAL -->
<div id="edit-modal">
  <div class="modal-content">
    <h3 id="edit-modal-title">Edit</h3>
    <div id="edit-modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-gold" onclick="window.saveEdit()">Save</button>
      <button class="btn" onclick="window.closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 🔧 FIREBASE CONFIG

// ── INDEXEDDB OFFLINE LAYER ──────────────
const IDB_NAME = 'jeos', IDB_VER = 1;
let idb = null;

function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('docs')) db.createObjectStore('docs');
      if (!db.objectStoreNames.contains('queue')) db.createObjectStore('queue', { autoIncrement: true });
    };
    req.onsuccess = e => { idb = e.target.result; res(idb); };
    req.onerror = () => rej(req.error);
  });
}

async function idbGet(key) {
  if (!idb) return null;
  return new Promise(res => {
    const tx = idb.transaction('docs', 'readonly');
    const req = tx.objectStore('docs').get(key);
    req.onsuccess = () => res(req.result ?? null);
    req.onerror = () => res(null);
  });
}

async function idbSet(key, val) {
  if (!idb) return;
  return new Promise(res => {
    const tx = idb.transaction('docs', 'readwrite');
    tx.objectStore('docs').put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}

async function idbQueueWrite(path, data) {
  if (!idb) return;
  return new Promise(res => {
    const tx = idb.transaction('queue', 'readwrite');
    tx.objectStore('queue').add({ path, data, ts: Date.now() });
    tx.oncomplete = () => res();
    tx.onerror = () => res();
  });
}

async function idbFlushQueue() {
  if (!idb || !LIVE || !uid) return;
  const tx = idb.transaction('queue', 'readwrite');
  const store = tx.objectStore('queue');
  const all = await new Promise(res => { const r = store.getAll(); r.onsuccess = () => res(r.result); r.onerror = () => res([]); });
  const keys = await new Promise(res => { const r = store.getAllKeys(); r.onsuccess = () => res(r.result); r.onerror = () => res([]); });
  for (let i = 0; i < all.length; i++) {
    try {
      await setDoc(doc(db, all[i].path), all[i].data, { merge: true });
      store.delete(keys[i]);
    } catch (e) { break; } // stop if still offline
  }
  const queueSize = await new Promise(res => { const r = store.count(); r.onsuccess = () => res(r.result); r.onerror = () => res(0); });
  const offlineBadge = document.getElementById('offline-badge');
  if (offlineBadge) offlineBadge.style.display = queueSize > 0 ? 'block' : 'none';
}

// Initialise IDB and flush queue when coming online
openIDB().catch(() => {});
window.addEventListener('online', () => { idbFlushQueue(); updateOnlineStatus(); });
window.addEventListener('offline', () => updateOnlineStatus());

function updateOnlineStatus() {

}

// ── FIRESTORE HELPERS (now with IDB fallback) ──
async function fsGet(path) {
  // Try IDB cache first for speed, then Firestore
  const cached = await idbGet(path);
  if (!LIVE) return cached;
  if (!navigator.onLine) return cached;
  try {
    const snap = await getDoc(doc(db, path));
    const data = snap.exists() ? snap.data() : null;
    if (data) await idbSet(path, data);
    return data;
  } catch (e) {
    console.error('fsGet error:', e.code, e.message);
    return cached; // fall back to IDB on network error
  }
}

async function fsSet(path, data) {
  await idbSet(path, data); // always write locally first
  if (!LIVE) return;
  if (!navigator.onLine) {
    await idbQueueWrite(path, data);
    const badge = document.getElementById('offline-badge');
    if (badge) badge.style.display = 'block';
    return;
  }
  try {
    await setDoc(doc(db, path), data, { merge: true });
    syncPulse();
  } catch (e) {
    console.error('fsSet error:', e.code, e.message);
    await idbQueueWrite(path, data); // queue for retry
  }
}

async function fsColGet(path) {
  if (!LIVE) return [];
  if (!navigator.onLine) {
    // Return any IDB entries with this path prefix
    const cached = await idbGet(`col:${path}`);
    return cached || [];
  }
  try {
    const q = query(collection(db, path), orderBy('date', 'desc'));
    const snap = await getDocs(q);
    const results = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    await idbSet(`col:${path}`, results); // cache the collection
    return results;
  } catch (e) {
    console.error('fsColGet error:', e.code, e.message);
    const cached = await idbGet(`col:${path}`);
    return cached || [];
  }
}

async function fsColAdd(path, data) {
  if (!LIVE) return;
  data.date = data.date || todayKey();
  try {
    await addDoc(collection(db, path), data);
    syncPulse();
    // Invalidate collection cache
    await idbSet(`col:${path}`, null);
  } catch (e) {
    console.error('fsColAdd error:', e.code, e.message);
  }
}

async function fsColDel(path, id) {
  if (!LIVE) return;
  try {
    await deleteDoc(doc(db, path, id));
    syncPulse();
    await idbSet(`col:${path}`, null);
  } catch (e) {
    console.error('fsColDel error:', e.code, e.message);
  }
}

function syncPulse() { const el = document.getElementById('sync-status'); el.classList.add('syncing'); setTimeout(() => { el.classList.remove('syncing'); el.classList.add('synced'); setTimeout(() => el.classList.remove('synced'), 1000); }, 500); }

async function renderMatchStats(activities) {
  const matches = activities.filter(a => a.type === 'match');
  if (matches.length === 0) {
    document.getElementById('match-stats').innerHTML = '<div class="empty">No matches logged yet</div>';
    return;
  }
  
  const wins = matches.filter(m => m.result === 'win').length;
  const losses = matches.filter(m => m.result === 'loss').length;
  const opponents = {};

  matches.forEach(m => {
    // Track each opponent individually
    [m.opponent, m.opponent2].filter(Boolean).forEach(opp => {
      if (!opponents[opp]) opponents[opp] = { wins: 0, losses: 0 };
      if (m.result === 'win') opponents[opp].wins++;
      else if (m.result === 'loss') opponents[opp].losses++;
    });
  });
  
  let html = `<div style="margin-bottom:8px;"><strong>${wins}-${losses}</strong> record</div>`;
  html += '<div style="font-size:0.7rem;color:var(--soft);">';
  Object.entries(opponents).forEach(([opp, stats]) => {
    const oppRecord = `${stats.wins}-${stats.losses}`;
    html += `<div style="padding:4px 0;border-bottom:1px solid var(--border);">${opp}: ${oppRecord}</div>`;
  });
  html += '</div>';
  
  document.getElementById('match-stats').innerHTML = html;
}

// ── PAGE: UNI LOG ────────────────────────
const UNI_MODULES = [
  { code: 'CSC-10076', name: 'Programming' },
  { code: 'CSC-10077', name: 'Maths & Stats' },
  { code: 'CSC-10082', name: 'Data Ethics' },
  { code: 'CSC-10078', name: 'Professional Skills' },
];
const OTJ_ANNUAL_TARGET = 200; // hours — configurable

async function renderUniPage() {
  const entries = await fsColGet(up('uni_log'));
  const targets = await fsGet(up('otj_targets')) || { annual: OTJ_ANNUAL_TARGET };
  const annualTarget = targets.annual || OTJ_ANNUAL_TARGET;

  // Calculate totals
  const totalMins = entries.reduce((s, e) => s + (e.otj_mins || (e.otj ? e.otj * 60 : 0)), 0);
  const totalHrs = totalMins / 60;
  const pct = Math.min(100, (totalHrs / annualTarget) * 100);
  const remaining = Math.max(0, annualTarget - totalHrs);

  // Per-module breakdown
  const byModule = {};
  UNI_MODULES.forEach(m => { byModule[m.code] = 0; });
  entries.forEach(e => {
    const mins = e.otj_mins || (e.otj ? e.otj * 60 : 0);
    if (byModule[e.module] !== undefined) byModule[e.module] += mins;
    else if (e.module) byModule[e.module] = (byModule[e.module] || 0) + mins;
  });

  // Weeks elapsed in year (for pace calculation)
  const now = new Date();
  const yearStart = new Date(now.getFullYear(), 0, 1);
  const weeksElapsed = Math.max(1, Math.ceil((now - yearStart) / (7 * 24 * 60 * 60 * 1000)));
  const weeksInYear = 52;
  const expectedByNow = (annualTarget / weeksInYear) * weeksElapsed;
  const pace = totalHrs >= expectedByNow ? 'on-pace' : 'behind';
  const paceHrs = Math.abs(totalHrs - expectedByNow).toFixed(1);

  const fmtH = (mins) => {
    const h = Math.floor(mins / 60), m = mins % 60;
    return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : (m > 0 ? `${m}m` : '0m');
  };

  let html = `
    <div class="section-group">
      <div class="section-label">Uni Activity Log</div>

      <!-- ANNUAL TARGET CARD -->
      <div class="card" style="background:var(--gold-bg);border-color:var(--gold-dim);">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <div>
            <div style="font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;">OTJ Progress</div>
            <div style="font-size:1.6rem;font-weight:800;color:var(--gold);font-family:var(--font-h);">${totalHrs.toFixed(1)}h <span style="font-size:0.8rem;color:var(--soft);">/ ${annualTarget}h</span></div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:0.65rem;color:${pace==='on-pace'?'var(--green)':'var(--red)'};">${pace==='on-pace'?`▲ ${paceHrs}h ahead`:`▼ ${paceHrs}h behind`}</div>
            <div style="font-size:0.6rem;color:var(--muted);">${remaining.toFixed(1)}h remaining</div>
          </div>
        </div>
        <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;margin-bottom:6px;">
          <div style="height:100%;width:${pct.toFixed(1)}%;background:var(--gold);border-radius:4px;transition:width 0.4s;"></div>
        </div>
        <div style="font-size:0.62rem;color:var(--muted);">${pct.toFixed(1)}% complete • Week ${weeksElapsed} of ${weeksInYear}</div>
      </div>

      <!-- MODULE BREAKDOWN -->
      <div class="card">
        <div class="card-title">By Module</div>
        ${UNI_MODULES.map(m => {
          const mins = byModule[m.code] || 0;
          const hrs = mins / 60;
          const modTarget = annualTarget / UNI_MODULES.length;
          const modPct = Math.min(100, (hrs / modTarget) * 100);
          return `
          <div style="margin-bottom:10px;">
            <div style="display:flex;justify-content:space-between;font-size:0.7rem;margin-bottom:3px;">
              <span style="color:var(--text);">${m.name} <span style="color:var(--muted);font-size:0.62rem;">${m.code}</span></span>
              <span style="color:var(--gold);">${fmtH(mins)}</span>
            </div>
            <div style="height:5px;background:var(--surface2);border-radius:3px;">
              <div style="height:100%;width:${modPct.toFixed(1)}%;background:var(--gold);border-radius:3px;"></div>
            </div>
          </div>`;
        }).join('')}
        <div style="margin-top:6px;">
          <button class="btn" onclick="editOTJTarget()" style="font-size:0.65rem;padding:4px 8px;">⚙ Set Annual Target</button>
        </div>
      </div>

      <!-- QUICK LOG -->
      <div class="card">
        <div class="card-title">Quick Log</div>
        <div class="mini-prompt">Track learning and OTJ hours</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
          <input type="date" id="uni-date" value="${todayKey2()}"/>
          <select id="uni-module">
            <option value="">Select module...</option>
            ${UNI_MODULES.map(m => `<option value="${m.code}">${m.name}</option>`).join('')}
          </select>
        </div>
        <input type="text" placeholder="Details..." id="uni-details" style="margin-bottom:8px;"/>
        <textarea id="uni-learning" placeholder="What you learned..." style="height:60px;margin-bottom:8px;"></textarea>
        <div style="display:flex;gap:6px;align-items:center;">
          <label class="lbl" style="margin:0;flex:0;">OTJ:</label>
          <input type="number" placeholder="Hrs" id="uni-otj-h" min="0" style="flex:0.4;margin:0;"/>
          <span style="color:var(--muted);">h</span>
          <input type="number" placeholder="Mins" id="uni-otj-m" min="0" max="59" style="flex:0.4;margin:0;"/>
          <span style="color:var(--muted);">m</span>
          <button class="btn-gold" onclick="addUni()" style="flex:1;">Log Entry</button>
        </div>
      </div>

      <!-- SEARCH/FILTER -->
      <div class="card">
        <div class="card-title">Entries</div>
        <div style="display:flex;gap:6px;margin-bottom:8px;">
          <input type="text" id="uni-search" placeholder="Search..." style="flex:1;margin:0;" oninput="filterUniList()"/>
          <select id="uni-filter-module" style="flex:0.8;margin:0;" onchange="filterUniList()">
            <option value="">All modules</option>
            ${UNI_MODULES.map(m => `<option value="${m.code}">${m.name}</option>`).join('')}
          </select>
        </div>
        <div id="uni-list"></div>
      </div>
    </div>
  `;

  document.getElementById('content').innerHTML = html;
  renderUniList(entries);
}

function renderUniList(entries, isFiltered = false) {
  if (!isFiltered) _uniEntries = entries;
  const fmtH = (mins) => {
    const h = Math.floor(mins / 60), m = mins % 60;
    return h > 0 ? (m > 0 ? `${h}h ${m}m` : `${h}h`) : (m > 0 ? `${m}m` : '0m');
  };
  const modName = (code) => UNI_MODULES.find(m => m.code === code)?.name || code;
  const html = entries.slice(0, 30).map(e => {
    const mins = e.otj_mins || (e.otj ? e.otj * 60 : 0);
    return `
    <div style="padding:8px;border-bottom:1px solid var(--border);font-size:0.7rem;">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <span style="color:var(--text);font-weight:600;">${fmtDate(e.date)}</span>
        <span style="color:var(--gold);font-size:0.65rem;">${fmtH(mins)}</span>
      </div>
      <div style="color:var(--gold);font-size:0.62rem;margin-top:1px;">${modName(e.module)}</div>
      <div style="color:var(--soft);margin-top:2px;">${e.details || '—'}</div>
      ${e.learning ? `<div style="color:var(--muted);margin-top:2px;font-style:italic;">↳ ${e.learning}</div>` : ''}
      <div style="display:flex;gap:4px;margin-top:4px;">
        <button class="btn-x" onclick="openEditModal('Uni','uni_log','${e.id}',[{key:'date',label:'Date',type:'date',value:'${e.date}'},{key:'module',label:'Module',value:'${e.module}'},{key:'details',label:'Details',value:'${(e.details||'').replace(/"/g,'&quot;')}'},{key:'learning',label:'Learning',type:'textarea',value:'${(e.learning||'').replace(/"/g,'&quot;')}'},{key:'otj_mins',label:'OTJ Mins',type:'number',value:String(e.otj_mins||0)}])">✎</button>
        <button class="btn-x" onclick="delUni('${e.id}')">✕</button>
      </div>
    </div>
  `}).join('') || '<div class="empty">No entries logged yet</div>';
  const el = document.getElementById('uni-list');
  if (el) el.innerHTML = html;
}

async function fetchDailyRange(days) {
  const result = [];
  const now = new Date();
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    result.push({ date: k, ...( v || {}) });
  }
  return result;
}

async function renderMoodHm(days = 30) {
  const data = await fetchDailyRange(days);
  const moods = ['', '😔', '😐', '😊', '😄', '🔥'];
  const moodColors = ['var(--surface3)', '#c0392b', '#c8a96e', '#4caf7d', '#5b8dee', '#f0ad4e'];

  // Helper: get averaged mood value for a day's data (handles new array and old flat field)
  const getDayMood = (d) => {
    if (d.moods?.length) {
      return Math.round(d.moods.reduce((s, m) => s + m.mood, 0) / d.moods.length);
    }
    return d.mood || 0;
  };

  const getDayTooltip = (d) => {
    if (d.moods?.length) {
      return d.moods.map(m => `${moods[m.mood]} ${m.time}${m.trigger ? ': ' + m.trigger : ''}`).join(' | ');
    }
    const m = d.mood || 0;
    return fmtDate(d.date) + (m ? ' ' + moods[m] : ' –') + (d.mood_trigger ? ': ' + d.mood_trigger : '');
  };

  const cols = [];
  for (let c = 0; c < Math.ceil(data.length / 7); c++) {
    const cc = data.slice(c * 7, c * 7 + 7);
    cols.push(`<div style="display:flex;flex-direction:column;gap:3px;">${cc.map(d => {
      const m = getDayMood(d);
      const tip = fmtDate(d.date) + ' ' + getDayTooltip(d);
      return `<div style="width:20px;height:20px;border-radius:3px;background:${moodColors[m]};cursor:default;display:flex;align-items:center;justify-content:center;font-size:0.65rem;opacity:${m ? 1 : 0.25};" title="${tip}">${m > 0 ? moods[m] : ''}</div>`;
    }).join('')}</div>`);
  }
  const el = document.getElementById('mood-heatmap');
  if (el) el.innerHTML = `
    <div style="display:flex;gap:3px;overflow-x:auto;padding-bottom:4px;">${cols.join('')}</div>

    </div>`;
}

async function renderMoodDist(days = 30) {
  const data = await fetchDailyRange(days);
  const counts = [0, 0, 0, 0, 0, 0];
  const moods = ['', '😔', '😐', '😊', '😄', '🔥'];
  const moodColors = ['', '#c0392b', '#c8a96e', '#4caf7d', '#5b8dee', '#f0ad4e'];

  const getMoodVal = (d) => {
    if (d.moods?.length) return Math.round(d.moods.reduce((s, m) => s + m.mood, 0) / d.moods.length);
    return d.mood || 0;
  };

  data.forEach(d => { const m = getMoodVal(d); if (m) counts[m]++; });
  const daysWithMood = data.filter(d => getMoodVal(d) > 0);
  const avg = daysWithMood.length ? (daysWithMood.reduce((s, d) => s + getMoodVal(d), 0) / daysWithMood.length).toFixed(1) : null;
  const maxC = Math.max(1, ...counts.slice(1));
  const el = document.getElementById('mood-dist-chart');
  const lbl = document.getElementById('mood-avg-label');
  const lblEl = document.getElementById('mood-dist-labels');
  if (lbl) lbl.textContent = avg ? `avg ${avg}/5` : '';
  if (el) el.innerHTML = counts.slice(1).map((c, i) => {
    const h = Math.max(2, (c / maxC) * 56);
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;justify-content:flex-end;">
      <div style="font-size:0.6rem;color:var(--muted);">${c || ''}</div>
      <div style="width:100%;height:${h}px;background:${moodColors[i+1]};border-radius:2px;" title="${moods[i+1]}: ${c} days"></div>
    </div>`;
  }).join('');
  if (lblEl) lblEl.innerHTML = moods.slice(1).map(m => `<div style="flex:1;text-align:center;font-size:0.8rem;">${m}</div>`).join('');
}

async function renderEnergyChart(days = 30) {
  const data = await fetchDailyRange(days);
  const items = data.filter(d => d.energy);
  const avg = items.length ? (items.reduce((s, d) => s + d.energy, 0) / items.length).toFixed(1) : null;
  const el = document.getElementById('energy-chart');
  const lbl = document.getElementById('energy-avg-label');
  const lblEl = document.getElementById('energy-chart-labels');
  if (lbl) lbl.textContent = avg ? `avg ${avg}/10` : '';

    const v = d.energy || 0;

    const color = v >= 7 ? 'var(--green)' : v >= 4 ? 'var(--gold)' : v > 0 ? 'var(--red)' : 'var(--surface3)';
    return `<div style="flex:1;height:${h}px;background:${color};border-radius:2px;min-width:2px;" title="${fmtDate(d.date)}: ${v}/10"></div>`;
  }).join('');

    lblEl.innerHTML = shown.map((d, i) => `<div style="flex:1;font-size:0.52rem;color:var(--muted);text-align:center;overflow:hidden;">${i % step === 0 ? fmtDate(d.date).split(' ')[0] : ''}</div>`).join('');

async function renderPhoneChart(days = 30) {
  const data = await fetchDailyRange(days);
  const items = data.filter(d => d.phone?.mins != null);
  const avg = items.length ? (items.reduce((s, d) => s + d.phone.mins, 0) / items.length / 60).toFixed(1) : null;
  const el = document.getElementById('phone-chart');
  const lbl = document.getElementById('phone-avg-label');
  const lblEl = document.getElementById('phone-chart-labels');
  if (lbl) lbl.textContent = avg ? `avg ${avg}h/day` : '';
  if (!el) return;
  const shown = data.slice(-Math.min(days, 30));
  const maxV = Math.max(1, ...shown.filter(d => d.phone?.mins).map(d => d.phone.mins / 60), 8);
  el.innerHTML = shown.map(d => {
    const hrs = d.phone?.mins != null ? d.phone.mins / 60 : null;

    const h = Math.max(2, (hrs / maxV) * 56);
    const color = hrs <= 4 ? 'var(--green)' : hrs <= 6 ? 'var(--gold)' : 'var(--red)';
    return `<div style="flex:1;height:${h}px;background:${color};border-radius:2px;min-width:2px;" title="${fmtDate(d.date)}: ${hrs.toFixed(1)}h"></div>`;
  }).join('');
  if (lblEl) {
    const step = Math.ceil(shown.length / 5);
    lblEl.innerHTML = shown.map((d, i) => `<div style="flex:1;font-size:0.52rem;color:var(--muted);text-align:center;overflow:hidden;">${i % step === 0 ? fmtDate(d.date).split(' ')[0] : ''}</div>`).join('');

}

async function renderRevChart() {

    el.style.cssText = 'display:flex;gap:4px;align-items:flex-end;height:60px;';
    el.innerHTML = valid.length ? valid.map(r => {
      const avg = areas.reduce((s, a) => s + (r.scores?.[a] || 0), 0) / areas.length;
      const h = Math.max(2, (avg / 10) * 56);
      const color = avg >= 7 ? 'var(--green)' : avg >= 5 ? 'var(--gold)' : 'var(--red)';

        <div style="font-size:0.52rem;color:var(--muted);">${avg.toFixed(1)}</div>

      </div>`;
    }).join('') : '<div class="empty">No review scores yet</div>';
  }
  // Latest week area breakdown
  if (breakdown && valid.length) {
    const latest = valid[valid.length - 1];
    const areaColors = { Professional: 'var(--gold)', Health: 'var(--green)', Personal: 'var(--blue)', Relationships: '#e87c6e', Learning: '#b07fd4' };
    breakdown.innerHTML = `<div style="font-size:0.65rem;color:var(--muted);margin-bottom:6px;">Latest week breakdown</div>` +
      areas.map(a => {
        const score = latest.scores?.[a] || 0;
        const pct = (score / 10) * 100;
        return `<div style="margin-bottom:5px;">

async function renderGymMonthly() {
  const cols = { push: 'var(--gold)', pull: 'var(--green)', legs: 'var(--blue)' };
  const months = [];
  const counts = {};
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = d.toISOString().slice(0, 7);
    months.push(m);
    counts[m] = { push: 0, pull: 0, legs: 0 };
  }
  for (let i = 0; i < 180; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const m = k.slice(0, 7);
    if (!counts[m]) continue;
    const v = await fsGet(up(`daily/${k}`));
    if (v?.gym) {
      if (v.gym.push) counts[m].push++;
      if (v.gym.pull) counts[m].pull++;
      if (v.gym.legs) counts[m].legs++;
    }
  }
  const exercises = await fsColGet(up('exercises')) || [];
  const seen = {};
  exercises.forEach(e => {
    const m = e.date?.slice(0, 7);
    if (!counts[m] || !['push','pull','legs'].includes(e.gym_category)) return;
    const key = `${e.date}-${e.gym_category}`;
    if (!seen[key]) { seen[key] = true; counts[m][e.gym_category]++; }
  });
  const el = document.getElementById('gym-monthly-chart');
  if (el) {
    const maxVal = Math.max(1, ...months.flatMap(m => Object.values(counts[m])));
    el.innerHTML = months.map(m => {
      const bars = Object.entries(counts[m]).map(([type, val]) => {
        const h = Math.max(2, (val / maxVal) * 72);
        return `<div style="flex:1;height:${h}px;background:${cols[type]};border-radius:2px;" title="${type}: ${val}">
          <div style="font-size:0.52rem;color:rgba(255,255,255,0.6);text-align:center;padding-top:2px;">${val || ''}</div>
        </div>`;
      }).join('');
      return `<div style="flex:1;min-width:0;">
        <div style="display:flex;gap:2px;align-items:flex-end;height:76px;">${bars}</div>
        <div style="font-size:0.6rem;color:var(--muted);text-align:center;margin-top:4px;">${mLbl(m)}</div>
      </div>`;
    }).join('');
  }
}

async function renderGymConsistency() {
  const now = new Date();
  const day = now.getDay() || 7;
  const weeks = [];
  for (let w = 11; w >= 0; w--) {
    const ws = new Date(now); ws.setDate(now.getDate() - day + 1 - (w * 7));
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    weeks.push({ start: ws.toISOString().slice(0,10), end: we.toISOString().slice(0,10), label: fmtDate(ws.toISOString().slice(0,10)) });
  }
  // Build daily gym data map
  const dailyMap = {};
  for (let i = 0; i < 90; i++) {
    const d = new Date(now); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.gym) dailyMap[k] = v.gym;
  }
  const exercises = await fsColGet(up('exercises')) || [];
  exercises.forEach(e => {
    if (!dailyMap[e.date]) dailyMap[e.date] = {};
    if (e.gym_category) dailyMap[e.date][e.gym_category] = true;
  });

  const cats = ['push', 'pull', 'legs'];
  const el = document.getElementById('gym-consistency-grid');
  if (!el) return;
  el.innerHTML = `
    <div style="display:grid;grid-template-columns:40px repeat(${weeks.length},1fr);gap:3px;align-items:center;">
      <div></div>
      ${weeks.map(w => `<div style="font-size:0.5rem;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;">${w.label.split(' ')[0]}</div>`).join('')}
      ${cats.map(cat => `
        <div style="font-size:0.62rem;color:var(--soft);text-transform:uppercase;text-align:right;padding-right:4px;">${cat}</div>
        ${weeks.map(w => {
          const hit = Object.entries(dailyMap).some(([date, gym]) => date >= w.start && date <= w.end && gym[cat]);
          return `<div style="height:16px;border-radius:2px;background:${hit ? 'var(--green)' : 'var(--surface2)'};border:1px solid ${hit ? 'transparent' : 'var(--border2)'};" title="${w.label}: ${cat} ${hit ? '✓' : '✗'}"></div>`;
        }).join('')}
      `).join('')}
    </div>`;
}

async function renderGymVolume() {
  const now = new Date();
  const day = now.getDay() || 7;
  const weeks = [];
  for (let w = 7; w >= 0; w--) {
    const ws = new Date(now); ws.setDate(now.getDate() - day + 1 - (w * 7));
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    weeks.push({ start: ws.toISOString().slice(0,10), end: we.toISOString().slice(0,10), label: fmtDate(ws.toISOString().slice(0,10)) });
  }
  const exercises = await fsColGet(up('exercises')) || [];
  const weeklyVol = weeks.map(w => {
    const vol = exercises.filter(e => e.date >= w.start && e.date <= w.end)
      .reduce((s, e) => s + (e.sets||[]).reduce((ss, set) => ss + (parseInt(set.reps)||0) * (parseFloat(set.weight)||0), 0), 0);
    return { label: w.label, vol };
  });
  const maxV = Math.max(1, ...weeklyVol.map(w => w.vol));
  const el = document.getElementById('gym-volume-chart');
  const lblEl = document.getElementById('gym-volume-labels');
  if (el) {
    el.innerHTML = weeklyVol.map(w => {
      const h = Math.max(w.vol > 0 ? 4 : 1, (w.vol / maxV) * 66);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:2px;">
        <div style="font-size:0.55rem;color:var(--muted);">${w.vol > 0 ? (w.vol/1000).toFixed(1)+'k' : ''}</div>
        <div style="width:100%;height:${h}px;background:${w.vol > 0 ? 'var(--blue)' : 'var(--surface3)'};border-radius:2px;" title="${w.label}: ${Math.round(w.vol)}kg"></div>
      </div>`;
    }).join('');
  }
  if (lblEl) lblEl.innerHTML = weeklyVol.map(w => `<div style="flex:1;font-size:0.52rem;color:var(--muted);text-align:center;overflow:hidden;">${w.label.split(' ')[0]}</div>`).join('');
}

async function renderGymPBs() {

    const maxWeight = Math.max(...(e.sets||[]).map(s => parseFloat(s.weight)||0));

async function renderPadelStats() {
  const all = await fsColGet(up('padel')) || [];
  const matches = all.filter(a => a.type === 'match');
  const sessions = all.filter(a => a.type === 'session' || !a.type);

  // Win/loss summary
  const wins = matches.filter(m => m.result === 'win').length;
  const losses = matches.filter(m => m.result === 'loss').length;
  const winrate = (wins + losses) > 0 ? Math.round((wins / (wins + losses)) * 100) + '%' : '—';
  const wEl = document.getElementById('pd-wins');
  const lEl = document.getElementById('pd-losses');
  const wrEl = document.getElementById('pd-winrate');
  if (wEl) wEl.textContent = wins;
  if (lEl) lEl.textContent = losses;
  if (wrEl) wrEl.textContent = winrate;

  // Monthly sessions + matches chart
  const now = new Date();
  const months = [];
  const mCounts = {};
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = d.toISOString().slice(0, 7);
    months.push(m);
    mCounts[m] = { sessions: 0, matches: 0 };
  }
  all.forEach(a => {
    const m = a.date?.slice(0,7);
    if (!mCounts[m]) return;
    if (a.type === 'match') mCounts[m].matches++;
    else mCounts[m].sessions++;
  });
  const maxM = Math.max(1, ...months.flatMap(m => [mCounts[m].sessions, mCounts[m].matches]));
  const mEl = document.getElementById('padel-monthly-chart');
  if (mEl) {
    mEl.innerHTML = months.map(m => {
      const hs = Math.max(mCounts[m].sessions > 0 ? 3 : 1, (mCounts[m].sessions / maxM) * 66);
      const hm = Math.max(mCounts[m].matches > 0 ? 3 : 1, (mCounts[m].matches / maxM) * 66);
      return `<div style="flex:1;min-width:0;">
        <div style="display:flex;gap:2px;align-items:flex-end;height:70px;">
          <div style="flex:1;height:${hs}px;background:var(--green);border-radius:2px;" title="${mLbl(m)} sessions: ${mCounts[m].sessions}"></div>
          <div style="flex:1;height:${hm}px;background:var(--gold);border-radius:2px;" title="${mLbl(m)} matches: ${mCounts[m].matches}"></div>
        </div>
        <div style="font-size:0.58rem;color:var(--muted);text-align:center;margin-top:3px;">${mLbl(m)}</div>
      </div>`;
    }).join('');
  }

  // Win/loss per month chart
  const wlEl = document.getElementById('pd-winloss-chart');
  if (wlEl) {
    const wlByMonth = {};
    months.forEach(m => { wlByMonth[m] = { w: 0, l: 0 }; });
    matches.forEach(m => {
      const mo = m.date?.slice(0,7);
      if (!wlByMonth[mo]) return;
      if (m.result === 'win') wlByMonth[mo].w++;
      else if (m.result === 'loss') wlByMonth[mo].l++;
    });
    const maxWL = Math.max(1, ...months.flatMap(m => [wlByMonth[m].w, wlByMonth[m].l]));
    wlEl.innerHTML = months.map(m => {
      const hw = Math.max(wlByMonth[m].w > 0 ? 3 : 1, (wlByMonth[m].w / maxWL) * 46);
      const hl = Math.max(wlByMonth[m].l > 0 ? 3 : 1, (wlByMonth[m].l / maxWL) * 46);
      return `<div style="flex:1;display:flex;gap:1px;align-items:flex-end;height:50px;">
        <div style="flex:1;height:${hw}px;background:var(--green);border-radius:1px;" title="${mLbl(m)} wins: ${wlByMonth[m].w}"></div>
        <div style="flex:1;height:${hl}px;background:var(--red);border-radius:1px;" title="${mLbl(m)} losses: ${wlByMonth[m].l}"></div>
      </div>`;
    }).join('');
  }

  // Opponent breakdown
  const oppEl = document.getElementById('pd-opponent-breakdown');
  if (oppEl) {
    const opps = {};
    matches.forEach(m => {
      if (!m.opponent) return;
    [m.opponent, m.opponent2].filter(Boolean).forEach(opp => {
      if (!opps[opp]) opps[opp] = { w: 0, l: 0, skill: m.skill };
      if (m.result === 'win') opps[opp].w++;
      else if (m.result === 'loss') opps[opp].l++;
    });
    });
    const sorted = Object.entries(opps).sort((a, b) => (b[1].w + b[1].l) - (a[1].w + a[1].l));
    oppEl.innerHTML = sorted.length ? sorted.map(([name, rec]) => {
      const total = rec.w + rec.l;
      const wr = total ? Math.round((rec.w / total) * 100) : 0;
      const barColor = wr >= 60 ? 'var(--green)' : wr >= 40 ? 'var(--gold)' : 'var(--red)';
      return `<div style="padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
          <span style="font-size:0.73rem;color:var(--text);">${name}</span>
          <div style="text-align:right;">
            <span style="font-size:0.7rem;color:var(--green);">${rec.w}W</span>
            <span style="font-size:0.7rem;color:var(--muted);"> / </span>
            <span style="font-size:0.7rem;color:var(--red);">${rec.l}L</span>
            <span style="font-size:0.65rem;color:${barColor};margin-left:6px;">${wr}%</span>
          </div>
        </div>
        <div style="height:4px;background:var(--surface2);border-radius:2px;">
          <div style="height:100%;width:${wr}%;background:${barColor};border-radius:2px;"></div>
        </div>
      </div>`;
    }).join('') : '<div class="empty">No matches logged yet</div>';
  }

  // Recent form (last 10)
  const formEl = document.getElementById('pd-recent-form');
  if (formEl) {
    const recent = matches.slice(0, 10);
    formEl.innerHTML = recent.length ? `
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;">
        ${recent.map(m => {
          const isWin = m.result === 'win';
          const opp = m.opponent2 ? `${m.opponent} & ${m.opponent2}` : (m.opponent || '—');
          return `<div style="width:28px;height:28px;border-radius:50%;background:${isWin ? 'var(--green-bg)' : '#2a0e0e'};border:1px solid ${isWin ? 'var(--green)' : 'var(--red)'};display:flex;align-items:center;justify-content:center;font-size:0.65rem;color:${isWin ? 'var(--green)' : 'var(--red)'};" title="${fmtDate(m.date)} vs ${opp}: ${m.result}">${isWin ? 'W' : 'L'}</div>`;
        }).join('')}
      </div>
      ${recent.map(m => {
        const opp = m.opponent2 ? `${m.opponent} & ${m.opponent2}` : (m.opponent || '—');
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.7rem;">
          <span style="color:var(--soft);">${fmtDate(m.date)} vs ${opp}</span>
          <span style="color:${m.result==='win'?'var(--green)':'var(--red)'};">${m.result==='win'?'W':'L'} ${m.sets||''}</span>
        </div>`;
      }).join('')}
    ` : '<div class="empty">No matches logged yet</div>';
  }
}

function barHtml(lbl, val, max, color) {
  const h = Math.max(2, (val / max) * 60);
  return `<div style="flex:1;min-width:0;"><div style="display:flex;align-items:flex-end;height:60px;"><div style="flex:1;height:${h}px;background:${color};border-radius:2px;"></div></div><div style="font-size:0.56rem;color:var(--muted);text-align:center;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${lbl}</div></div>`;
}

// Submit mood entry - appends timestamped entry, max 3 per day
async function submitMoodEntry() {
  if (!selectedMoodForEntry) {
    toast('Select an emoji first');
    return;
  }
  const k = viewingYesterday ? getYesterdayKey() : todayKey2();
  const trigger = document.getElementById('mood-trigger').value.trim();
  const data = await fsGet(up(`daily/${k}`)) || {};

  // Migrate old flat mood to moods array
  if (!data.moods) {
    data.moods = data.mood ? [{ mood: data.mood, trigger: data.mood_trigger || '', time: '—', ts: 0 }] : [];
  }
  if (data.moods.length >= 3) { toast('Max 3 mood entries per day'); return; }

  const now = new Date();
  const time = now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
  data.moods.push({ mood: selectedMoodForEntry, trigger, time, ts: now.getTime() });

  // Keep legacy mood field = average for backwards compat
  const avg = Math.round(data.moods.reduce((s, m) => s + m.mood, 0) / data.moods.length);
  data.mood = avg;

  await fsSet(up(`daily/${k}`), data);

  selectedMoodForEntry = null;
  document.getElementById('mood-trigger').value = '';
  document.getElementById('mood-selected-display').textContent = '';
  document.querySelectorAll('.mood-btn').forEach(b => {
    b.style.background = 'var(--surface2)';
    b.style.color = 'var(--soft)';
    b.style.borderColor = '';
  });

  toast('Mood logged');
  renderMoodEntries(data);
}

function renderMoodEntries(data) {
  const moods = ['','😔','😐','😊','😄','🔥'];
  const moodColors = ['','#c0392b','#c8a96e','#4caf7d','#5b8dee','#f0ad4e'];
  const moodLabels = ['','Low','OK','Good','Great','Peak'];

  // Normalise to moods array (backwards compat with old flat mood field)
  const entries = data.moods?.length
    ? data.moods
    : (data.mood ? [{ mood: data.mood, trigger: data.mood_trigger || '', time: '—', ts: 0 }] : []);

  const listEl = document.getElementById('mood-entries-list');
  const inputEl = document.getElementById('mood-input-section');

  if (listEl) {
    if (!entries.length) {
      listEl.innerHTML = '';
    } else {
      listEl.innerHTML = entries.map((e, i) => `
        <div style="display:flex;align-items:center;gap:10px;padding:8px;background:var(--surface2);border-radius:6px;margin-bottom:6px;border-left:3px solid ${moodColors[e.mood]};">
          <span style="font-size:1.3rem;">${moods[e.mood]}</span>
          <div style="flex:1;min-width:0;">
            <div style="font-size:0.72rem;color:var(--text);font-weight:600;">${moodLabels[e.mood]} <span style="color:var(--muted);font-weight:400;font-size:0.65rem;">${e.time}</span></div>
            ${e.trigger ? `<div style="font-size:0.68rem;color:var(--soft);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${e.trigger}</div>` : ''}
          </div>
          <button class="btn-x" onclick="editMoodEntry(${i})" title="Edit">✎</button>
          <button class="btn-x" onclick="delMoodEntry(${i})" title="Delete">✕</button>
        </div>`).join('');
    }
  }

  // Hide/show input based on count
  if (inputEl) {
    inputEl.style.display = entries.length >= 3 ? 'none' : 'block';
    if (entries.length >= 3) {
      // Show a "max reached" notice
      const notice = document.getElementById('mood-max-notice');
      if (!notice) {
        const n = document.createElement('div');
        n.id = 'mood-max-notice';
        n.style.cssText = 'font-size:0.68rem;color:var(--muted);margin-top:6px;text-align:center;';
        n.textContent = '3 entries logged today — delete one to add another';
        listEl.after(n);
      }
    } else {
      document.getElementById('mood-max-notice')?.remove();
    }
  }
}

window.editMoodEntry = async (i) => {

window.delMoodEntry = async (i) => {

};

window.saveEdit = async () => {
  if (!editState.col || !editState.id) return;
  const updates = {};
  editState.fields.forEach(f => {
    const el = document.getElementById('ef-' + f.key);
    if (el) updates[f.key] = el.value;
  });
  const items = await fsColGet(up(editState.col));
  const item = items.find(i => i.id === editState.id);
  if (!item) { toast('Entry not found'); return; }
  const updated = { ...item, ...updates };
  await fsColDel(up(editState.col), editState.id);
  await fsColAdd(up(editState.col), updated);
  window.closeEditModal();
  toast('Saved');
  const renders = { padel: renderPadelPage, journal: renderJournalPage, uni_log: renderUniPage };
  const col = editState.col.split('/').pop();
  renders[col]?.();
};

window.doExportAll = async () => {

  data.reviews = {};
  data.energy_map = {};
  for (let i = 0; i < 52; i++) {
    const d = new Date();
    d.setDate(d.getDate() - (i * 7));
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    const wk = d.toISOString().slice(0, 10);
    const w = await fsGet(up(`weeks/${wk}`));
    if (w) data.weeks[wk] = w;
    const r = await fsGet(up(`reviews/${wk}`));
    if (r) data.reviews[wk] = r;
    const e = await fsGet(up(`energy_map/${wk}`));
    if (e) data.energy_map[wk] = e;
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `je-os-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Export downloaded');
};

  push: ['Chest Press (Machine)','Pec Deck','Shoulder Press (Machine)','Incline Chest Press','Dumbbell Press','Barbell Bench Press','Overhead Press (Barbell)','Tricep Pushdown','Tricep Dip Machine','Push-ups','Dips','Lateral Raise'],
  pull: ['Lat Pulldown','Cable Row','Seated Row Machine','Bicep Curl Machine','Preacher Curl','Dumbbell Curl','Pull-ups','Assisted Pull-up Machine','Face Pull','Rear Delt Fly','Deadlift','Romanian Deadlift'],
  legs: ['Leg Press','Hack Squat','Leg Curl','Leg Extension','Calf Raise','Smith Machine Squat','Barbell Squat','Bulgarian Split Squat','Hip Thrust','Glute Bridge','Walking Lunges','Step-ups'],
  other: ['Plank','Cable Crunch','Ab Rollout','Russian Twist','Hanging Leg Raise','Treadmill (Run)','Rowing Machine','Bike (Cardio)','Stairmaster','Custom']
};
const ALL_MACHINES = Object.values(MACHINES).flat();

function gymCategoryFromExercise(name) {
  const n = name.toLowerCase();
  for (const [cat, list] of Object.entries(MACHINES)) {
    if (cat === 'other') continue;
    if (list.some(m => m.toLowerCase() === n)) return cat;
  }
  if (['press','fly','dip','push','tri','chest','shoulder','front'].some(k => n.includes(k))) return 'push';
  if (['pull','row','curl','lat','bicep','deadlift','face','rear'].some(k => n.includes(k))) return 'pull';
  if (['squat','leg','lunge','hip','glute','calf','step','hack'].some(k => n.includes(k))) return 'legs';
  return null;
}

function renderVolumeChart(exercises) {
  const el = document.getElementById('volume-chart');
  if (!el) return;
  const cats = { push: 0, pull: 0, legs: 0 };
  const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - 28);
  exercises.filter(e => new Date(e.date) >= cutoff).forEach(e => {
    const cat = e.gym_category;
    if (cats[cat] !== undefined) {
      const vol = (e.sets||[]).reduce((s, set) => s + (parseInt(set.reps)||0) * (parseFloat(set.weight)||0), 0);
      cats[cat] += vol;
    }
  });
  const max = Math.max(1, ...Object.values(cats));
  const colors = { push: 'var(--gold)', pull: 'var(--green)', legs: 'var(--blue)' };
  el.innerHTML = `<div style="display:flex;gap:8px;align-items:flex-end;height:80px;">` +
    Object.entries(cats).map(([cat, vol]) => {
      const h = Math.max(4, (vol/max)*70);
      return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
        <div style="font-size:0.6rem;color:var(--muted);">${vol > 0 ? Math.round(vol/1000)+'k' : '0'}</div>
        <div style="width:100%;height:${h}px;background:${colors[cat]};border-radius:3px;"></div>
        <div style="font-size:0.65rem;color:var(--soft);text-transform:uppercase;">${cat}</div>
      </div>`;
    }).join('') + `</div>`;
}

async function calcGymStreak(exercisesIn) {
  const now = new Date();
  const day = now.getDay() || 7;
  const weekStart = new Date(now); weekStart.setDate(now.getDate() - day + 1);
  const thisWeekKey = weekStart.toISOString().slice(0, 10);
  const dailyData = {};

  // Use passed-in exercises or fetch once
  const exercises = exercisesIn || await fsColGet(up('exercises')) || [];
  exercises.forEach(e => {
    if (!dailyData[e.date]) dailyData[e.date] = { categories: new Set() };
    if (e.gym_category) dailyData[e.date].categories.add(e.gym_category);
  });

  // Fetch 28 days in parallel instead of sequentially
  const keys = Array.from({ length: 28 }, (_, i) => {
    const d = new Date(now); d.setDate(now.getDate() - i);
    return d.toISOString().slice(0, 10);
  });
  const dailyDocs = await Promise.all(keys.map(k => fsGet(up(`daily/${k}`))));
  keys.forEach((k, i) => {
    const v = dailyDocs[i];
    if (v?.gym) {
      if (!dailyData[k]) dailyData[k] = { categories: new Set() };
      if (v.gym.push) dailyData[k].categories.add('push');
      if (v.gym.pull) dailyData[k].categories.add('pull');
      if (v.gym.legs) dailyData[k].categories.add('legs');
    }
  });

  let weeks = 0;
  const thisWeek = { push: false, pull: false, legs: false };
  for (const [date, d] of Object.entries(dailyData)) {
    if (date >= thisWeekKey) d.categories.forEach(c => { if (thisWeek[c] !== undefined) thisWeek[c] = true; });
  }

  for (let w = 1; w <= 12; w++) {
    const ws = new Date(now); ws.setDate(now.getDate() - day + 1 - (w * 7));
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    const wsKey = ws.toISOString().slice(0, 10);
    const weKey = we.toISOString().slice(0, 10);
    const wCats = { push: false, pull: false, legs: false };
    for (const [date, d] of Object.entries(dailyData)) {
      if (date >= wsKey && date <= weKey) d.categories.forEach(c => { if (wCats[c] !== undefined) wCats[c] = true; });
    }
    if (Object.values(wCats).every(Boolean)) weeks++;
    else break;
  }

  return { weeks, thisWeek };
}

window.logExercise = async () => {
  const name = document.getElementById('ex-name').value.trim();
  if (!name) { toast('Enter exercise name'); return; }
  const rows = document.querySelectorAll('.ex-set-row');
  const sets = [];
  rows.forEach(row => {
    const reps = parseInt(row.querySelector('.ex-reps').value);
    const weight = parseFloat(row.querySelector('.ex-weight').value) || 0;
    const notes = row.querySelector('.ex-set-notes').value.trim();
    if (reps) sets.push({ reps, weight, notes });
  });
  if (!sets.length) { toast('Add at least one set with reps'); return; }
  const rpe = parseInt(document.getElementById('ex-rpe').value) || null;
  const gym_category = gymCategoryFromExercise(name);
  const entry = { name, sets, rpe, gym_category, date: todayKey2() };
  await fsColAdd(up('exercises'), entry);
  
  // Auto-tick gym toggle on today page if applicable
  if (gym_category && ['push','pull','legs'].includes(gym_category)) {
    const k = todayKey2();
    const daily = await fsGet(up(`daily/${k}`)) || {};
    daily.gym = daily.gym || {};
    if (!daily.gym[gym_category]) {
      daily.gym[gym_category] = true;
      await fsSet(up(`daily/${k}`), daily);
      toast(`Logged ${name} — auto-ticked ${gym_category.charAt(0).toUpperCase()+gym_category.slice(1)} day ✓`);
    } else {
      toast(`${name} logged`);
    }
  } else {
    toast(`${name} logged`);
  }
  
  // Clear form
  document.getElementById('ex-name').value = '';
  document.getElementById('ex-rpe').value = '';
  const container = document.getElementById('ex-sets-container');
  container.innerHTML = `<div class="ex-set-row" style="display:grid;grid-template-columns:1fr 1fr 1fr 28px;gap:6px;margin-bottom:4px;align-items:center;">
    <input type="number" placeholder="Reps" class="ex-reps" min="1" style="margin:0;"/>
    <input type="number" placeholder="Weight (kg)" class="ex-weight" min="0" step="0.5" style="margin:0;"/>
    <input type="text" placeholder="Notes" class="ex-set-notes" style="margin:0;"/>
    <button onclick="removeSetRow(this)" class="btn-x" style="font-size:0.8rem;margin:0;">✕</button>
  </div>`;
  
  // Refresh page
  await renderWorkoutPage();
  startRest(90); // auto-start rest timer
};

window.delExercise = async (id) => {
  if (!confirm('Remove exercise?')) return;
  await fsColDel(up('exercises'), id);
  await renderWorkoutPage();
};

// ── REST TIMER ───────────────────────────
let restInterval = null;
let restTotal = 0;
let restRemaining = 0;

window.startRest = (secs) => {
  clearInterval(restInterval);
  restTotal = secs;
  restRemaining = secs;
  updateRestDisplay();
  restInterval = setInterval(() => {
    restRemaining--;
    updateRestDisplay();
    if (restRemaining <= 0) {
      clearInterval(restInterval);
      toast('Rest complete — next set!');
      document.getElementById('rest-display').textContent = 'Done!';
      document.getElementById('rest-bar').style.width = '0%';
    }
  }, 1000);
};

window.stopRest = () => {
  clearInterval(restInterval);
  restInterval = null;
  if (document.getElementById('rest-display')) document.getElementById('rest-display').textContent = '–';
  if (document.getElementById('rest-bar')) document.getElementById('rest-bar').style.width = '0%';
};

function updateRestDisplay() {
  const m = Math.floor(restRemaining / 60);
  const s = restRemaining % 60;
  const el = document.getElementById('rest-display');
  const bar = document.getElementById('rest-bar');
  if (el) el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  if (bar) bar.style.width = `${(restRemaining / restTotal) * 100}%`;
  bar.style.background = restRemaining <= 10 ? 'var(--red)' : restRemaining <= 30 ? 'var(--gold)' : 'var(--green)';
}

function renderHabitsList(items, todayChecks) {
  if (!items.length) return '<div class="empty">No habits yet — add one above</div>';
  return items.map((h, i) => {
    const checked = todayChecks[`h${i}`] || false;
    return `
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px;background:var(--surface2);border-radius:4px;margin-bottom:6px;border-left:3px solid ${checked ? 'var(--green)' : 'var(--border2)'};">
        <input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleHabit(${i})" style="width:16px;height:16px;cursor:pointer;flex-shrink:0;margin-top:2px;"/>
        <div style="flex:1;">
          <div style="font-size:0.72rem;color:var(--soft);">After <span style="color:var(--gold);">${h.anchor}</span></div>
          <div style="font-size:0.75rem;font-weight:600;color:${checked ? 'var(--soft)' : 'var(--text)'};${checked ? 'text-decoration:line-through;' : ''}">I will ${h.action}</div>
          ${h.duration ? `<div style="font-size:0.62rem;color:var(--muted);">${h.duration}</div>` : ''}
          <div style="font-size:0.62rem;color:var(--muted);margin-top:4px;">🔥 ${h.streak||0} day streak</div>
        </div>
        <button class="btn-x" onclick="delHabit(${i})">✕</button>
      </div>
    `;
  }).join('');
}

window.addHabit = async () => {
  const anchor = document.getElementById('habit-anchor').value.trim();
  const action = document.getElementById('habit-action').value.trim();
  const duration = document.getElementById('habit-duration').value.trim();
  if (!anchor || !action) { toast('Fill in anchor and action'); return; }
  const habits = await fsGet(up('habits')) || { items: [] };
  habits.items = habits.items || [];
  habits.items.push({ anchor, action, duration, streak: 0, created: todayKey2() });
  await fsSet(up('habits'), habits);
  toast('Habit added');
  await renderHabitsPage();
};

window.toggleHabit = async (i) => {
  const todayChecks = await fsGet(up(`habit_checks/${todayKey2()}`)) || {};
  const key = `h${i}`;
  todayChecks[key] = !todayChecks[key];
  
  // Update streak
  const habits = await fsGet(up('habits')) || { items: [] };
  if (habits.items[i]) {
    if (todayChecks[key]) {
      const yesterday = getYesterdayKey();
      const yChecks = await fsGet(up(`habit_checks/${yesterday}`)) || {};
      habits.items[i].streak = (yChecks[key] ? (habits.items[i].streak || 0) : 0) + 1;
    } else {
      habits.items[i].streak = Math.max(0, (habits.items[i].streak || 1) - 1);
    }
    await fsSet(up('habits'), habits);
  }
  
  await fsSet(up(`habit_checks/${todayKey2()}`), todayChecks);
  await renderHabitsPage();
};

window.delHabit = async (i) => {
  if (!confirm('Delete this habit?')) return;
  const habits = await fsGet(up('habits')) || { items: [] };
  habits.items.splice(i, 1);
  await fsSet(up('habits'), habits);
  await renderHabitsPage();
};

// ── CORRELATION HINTS ────────────────────
async function renderCorrelationHints() {
  const el = document.getElementById('correlation-hints');
  if (!el) return;
  
  const data = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date(); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    const v = await fsGet(up(`daily/${k}`));
    if (v) data.push({ ...v, date: k }); // attach date key
  }
  
  if (data.length < 7) { el.innerHTML = '<div class="empty">Need 7+ days of data for patterns</div>'; return; }
  
  const hints = [];
  
  // Gym vs energy
  const gymDays = data.filter(d => d.gym?.push || d.gym?.pull || d.gym?.legs);
  const noGymDays = data.filter(d => !d.gym?.push && !d.gym?.pull && !d.gym?.legs);
  if (gymDays.length >= 3 && noGymDays.length >= 3) {
    const gymEnergy = gymDays.filter(d => d.energy).reduce((s,d) => s + d.energy, 0) / gymDays.filter(d=>d.energy).length;
    const noGymEnergy = noGymDays.filter(d => d.energy).reduce((s,d) => s + d.energy, 0) / noGymDays.filter(d=>d.energy).length;
    if (gymEnergy && noGymEnergy) {
      const diff = gymEnergy - noGymEnergy;
      if (Math.abs(diff) > 0.8) hints.push(`Gym days: avg energy ${gymEnergy.toFixed(1)} vs rest days ${noGymEnergy.toFixed(1)} — ${diff > 0 ? 'exercise is lifting you' : 'your rest days score higher'}`);
    }
  }
  
  // Phone vs mood
  const highPhoneDays = data.filter(d => d.phone?.mins > 240); // >4hrs
  const lowPhoneDays = data.filter(d => d.phone?.mins <= 240 && d.phone?.mins > 0);
  if (highPhoneDays.length >= 3 && lowPhoneDays.length >= 3) {
    const hMood = highPhoneDays.filter(d=>d.mood).reduce((s,d)=>s+d.mood,0)/highPhoneDays.filter(d=>d.mood).length;
    const lMood = lowPhoneDays.filter(d=>d.mood).reduce((s,d)=>s+d.mood,0)/lowPhoneDays.filter(d=>d.mood).length;
    if (hMood && lMood) {
      const diff = lMood - hMood;
      if (Math.abs(diff) > 0.4) hints.push(`Low phone days: avg mood ${lMood.toFixed(1)} vs high phone days ${hMood.toFixed(1)}`);
    }
  }
  
  // Reading streak effect on mood
  const readingDays = data.filter(d => d.reading?.pages > 0);
  const noReadingDays = data.filter(d => !d.reading?.pages);
  if (readingDays.length >= 3) {
    const rMood = readingDays.filter(d=>d.mood).reduce((s,d)=>s+d.mood,0)/readingDays.filter(d=>d.mood).length;
    const nMood = noReadingDays.filter(d=>d.mood).reduce((s,d)=>s+d.mood,0)/noReadingDays.filter(d=>d.mood).length||0;
    if (rMood && nMood && Math.abs(rMood-nMood) > 0.4) hints.push(`Reading days: avg mood ${rMood.toFixed(1)} vs non-reading days ${nMood.toFixed(1)}`);
  }
  
  // Best/worst mood day of week
  const byDay = {};
  data.filter(d => d.mood).forEach(d => {
    const dow = new Date(d.date+'T00:00').getDay();
    if (!byDay[dow]) byDay[dow] = [];
    byDay[dow].push(d.mood);
  });
  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const dayAvgs = Object.entries(byDay).map(([dow, moods]) => ({ day: dayNames[dow], avg: moods.reduce((a,b)=>a+b,0)/moods.length }));
  if (dayAvgs.length >= 5) {
    const best = dayAvgs.reduce((a,b) => a.avg > b.avg ? a : b);
    const worst = dayAvgs.reduce((a,b) => a.avg < b.avg ? a : b);
    hints.push(`Best mood day: ${best.day} (${best.avg.toFixed(1)}) — worst: ${worst.day} (${worst.avg.toFixed(1)})`);
  }
  
  if (!hints.length) { el.innerHTML = '<div class="empty">No strong patterns yet — keep logging</div>'; return; }
  
  el.innerHTML = hints.map(h => `
    <div style="padding:8px 10px;background:var(--surface2);border-radius:4px;margin-bottom:6px;border-left:2px solid var(--gold-dim);font-size:0.72rem;color:var(--soft);">
      → ${h}
    </div>
  `).join('');
}

async function updateStreaks() {
  let readStreak = 0;
  let mainStreak = 0;
  const today = new Date();

  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    const hasAnyData = v && (v.mood || v.energy || v.gym?.push || v.gym?.pull || v.gym?.legs ||
      v.reading?.pages > 0 || (v.wins && v.wins.length > 0) || v.journal || v.phone?.mins > 0);
    if (i === 0) { if (hasAnyData) mainStreak++; }
    else { if (hasAnyData) mainStreak++; else break; }
  }

  readStreak = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    const hasReading = v?.reading?.pages > 0 || v?.reading?.mins > 0;
    if (hasReading) readStreak++;
    else if (i > 0) break;
  }

  // Padel streak: consecutive weeks with at least one session or match
  let padelStreak = 0;
  const padel = await fsColGet(up('padel')) || [];
  const padelDates = new Set(padel.map(p => p.date));
  const dayOfWeek = today.getDay() || 7;
  for (let w = 0; w < 52; w++) {
    const ws = new Date(today); ws.setDate(today.getDate() - dayOfWeek + 1 - (w * 7));
    const we = new Date(ws); we.setDate(ws.getDate() + 6);
    const wsKey = ws.toISOString().slice(0, 10);
    const weKey = we.toISOString().slice(0, 10);
    const hasActivity = [...padelDates].some(d => d >= wsKey && d <= weKey);
    if (hasActivity) padelStreak++;
    else if (w > 0) break; // allow current week to be empty without breaking
  }

  const mainEl = document.getElementById('main-streak');
  const readEl = document.getElementById('read-streak');
  const padelEl = document.getElementById('padel-streak');
  if (mainEl) mainEl.textContent = mainStreak;
  if (readEl) readEl.textContent = readStreak;
  if (padelEl) padelEl.textContent = padelStreak;
}

// Keep for backwards compat (called from resetReadingStreak)
async function updateReadingStreak() {
  await updateStreaks();
}

async function resetReadingStreak() {
  if (!confirm('Reset reading streak? This cannot be undone.')) return;
  // Clear all reading entries in past 365 days
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.reading) {
      delete v.reading;
      await fsSet(up(`daily/${k}`), v);
    }
  }
  await updateReadingStreak();
}

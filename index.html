<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#080808">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="JE OS">
<title>JE — OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23080808' width='100' height='100'/><text x='50' y='75' font-size='60' font-weight='bold' text-anchor='middle' fill='%23c8a96e' font-family='Arial'>J</text></svg>">
<link rel="manifest" id="pwa-manifest">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080808;--surface:#101010;--surface2:#161616;--surface3:#1c1c1c;
  --border:#1e1e1e;--border2:#272727;--border3:#303030;
  --text:#e4e0d8;--muted:#4a4a4a;--muted2:#333;--soft:#888;
  --gold:#c8a96e;--gold-dim:#6b5530;--gold-bg:#1a1508;
  --green:#4caf7d;--green-bg:#0e1f14;
  --red:#e05a5a;--blue:#5b8dee;
  --sidebar-w:220px;
  --font-h:'Syne',sans-serif;--font-m:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:14px;-webkit-font-smoothing:antialiased;}
body{background:var(--bg);color:var(--text);font-family:var(--font-m);min-height:100vh;line-height:1.5;overflow-x:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

/* ── AUTH ── */
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.auth-wrap{width:100%;max-width:340px;}
.auth-logo{font-family:var(--font-h);font-size:3rem;font-weight:800;letter-spacing:-0.04em;margin-bottom:2px;}
.auth-logo span{color:var(--gold);}
.auth-sub{font-size:0.62rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:36px;}
.auth-card{background:var(--surface);border:1px solid var(--border2);border-radius:12px;padding:26px;}
.auth-card h2{font-family:var(--font-h);font-size:1rem;font-weight:700;margin-bottom:3px;}
.auth-card p{font-size:0.7rem;color:var(--soft);margin-bottom:22px;line-height:1.6;}
.btn-google{width:100%;background:#fff;border:none;border-radius:7px;color:#111;font-family:var(--font-m);font-size:0.76rem;font-weight:500;padding:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity 0.15s;}
.btn-google:hover{opacity:0.9;}
#auth-err{font-size:0.7rem;color:var(--red);margin-top:10px;text-align:center;min-height:14px;}

/* ── APP SHELL ── */
#app{display:none;min-height:100vh;}
.app-layout{display:flex;min-height:100vh;}

/* ── SIDEBAR ── */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:width 0.25s cubic-bezier(0.4,0,0.2,1),transform 0.25s cubic-bezier(0.4,0,0.2,1);}
.sidebar.collapsed{width:52px;}
.sidebar.collapsed .logo-sub,.sidebar.collapsed .uname,.sidebar.collapsed .sync-dot,.sidebar.collapsed .nav-section-label,.sidebar.collapsed .ni-label,.sidebar.collapsed .sidebar-bottom .btn{display:none;}
.sidebar.collapsed .streak-pill,.sidebar.collapsed .reading-streak-pill{flex-direction:column;align-items:center;gap:2px;padding:7px 6px;}
.sidebar.collapsed .streak-num,.sidebar.collapsed .rs-num{font-size:1rem;}
.sidebar.collapsed .streak-info,.sidebar.collapsed .rs-info{display:none;}
.sidebar.collapsed .sidebar-bottom{flex-direction:column;gap:6px;align-items:center;padding:10px 6px;}
.sidebar.collapsed .sidebar-logo{padding:16px 14px;}
.sidebar.collapsed .logo{font-size:1rem;}
.sidebar.collapsed .sidebar-user{padding:12px 14px;justify-content:center;}
.sidebar.collapsed .uav{margin:0;}
.sidebar.collapsed .nav-item{padding:10px;justify-content:center;}
.sidebar.collapsed .ni-icon{width:auto;font-size:1rem;}
.sidebar.collapsed .nav-section{margin-bottom:10px;}
.sidebar.collapsed .sidebar-bottom{padding:10px;display:flex;justify-content:center;}
.sidebar-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border);}
.logo{font-family:var(--font-h);font-weight:800;font-size:1.3rem;letter-spacing:-0.03em;}
.logo span{color:var(--gold);}
.logo-sub{font-size:0.56rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;margin-top:1px;}
.sidebar-user{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;}
.sidebar-user:hover .uname{color:var(--text);}
.uav{width:24px;height:24px;border-radius:50%;background:var(--gold-dim);object-fit:cover;flex-shrink:0;}
.uname{font-size:0.68rem;color:var(--soft);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted2);transition:background 0.3s;flex-shrink:0;}
.sync-dot.syncing{background:var(--gold);animation:blink 0.8s infinite;}
.sync-dot.synced{background:var(--green);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.sidebar-nav{flex:1;padding:12px 10px;overflow-y:auto;}
.nav-section{margin-bottom:18px;}
.nav-section-label{font-size:0.56rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--muted);padding:0 8px;margin-bottom:5px;}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:all 0.15s;color:var(--soft);font-size:0.73rem;border:1px solid transparent;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{background:var(--gold-bg);color:var(--gold);border-color:var(--gold-dim);}
.nav-item .ni-icon{font-size:0.9rem;width:16px;text-align:center;flex-shrink:0;}
.nav-item .ni-label{flex:1;}
.sidebar-bottom{padding:12px 10px;border-top:1px solid var(--border);}
.streak-pill{display:flex;align-items:center;gap:8px;padding:9px 10px;background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:7px;}
.streak-num{font-family:var(--font-h);font-size:1.4rem;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-0.02em;}
.streak-info{font-size:0.62rem;color:var(--soft);line-height:1.5;}
.streak-info strong{color:var(--gold);display:block;font-size:0.65rem;}

/* ── MAIN CONTENT ── */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh;transition:margin-left 0.25s cubic-bezier(0.4,0,0.2,1);}
.sidebar.collapsed~.main,.sidebar.collapsed+.main{margin-left:52px;}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:50;}
.topbar-left{display:flex;align-items:center;gap:12px;}
.hamburger{background:none;border:none;color:var(--soft);cursor:pointer;font-size:1.1rem;padding:4px;transition:color 0.15s;display:block;}
.hamburger:hover{color:var(--text);}
.page-title{font-family:var(--font-h);font-size:1rem;font-weight:700;color:var(--text);}
.page-title span{color:var(--gold);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.date-pill{font-size:0.65rem;color:var(--muted);}
.date-pill strong{color:var(--soft);display:block;font-size:0.72rem;}
#install-btn{background:none;border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.62rem;padding:4px 9px;cursor:pointer;transition:all 0.15s;display:none;}
#install-btn:hover{color:var(--gold);border-color:var(--gold-dim);}
.content{padding:24px 28px 80px;}

/* ── LAYOUT GROUPS ── */
.section-group{margin-bottom:32px;}
.section-label{font-family:var(--font-h);font-size:0.8rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);padding:0 0 12px 0;margin-bottom:12px;border-bottom:1px solid var(--border);}

/* ── CARDS ── */
.card{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:14px;margin-bottom:12px;}
.card-title{font-family:var(--font-h);font-size:0.82rem;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.empty{color:var(--soft);font-size:0.72rem;padding:8px 0;font-style:italic;}
.mini-prompt{color:var(--soft);font-size:0.7rem;padding:6px;background:var(--surface2);border-radius:4px;margin-bottom:8px;border-left:2px solid var(--gold-dim);}

/* ── SPARKLINES ── */
.sparkline-container{display:flex;align-items:flex-end;gap:1px;height:28px;margin-top:4px;}
.sparkline-bar{flex:1;background:var(--gold);border-radius:1px;min-width:2px;}
.sparkline-bar.green{background:var(--green);}

/* ── GRID ── */
.ga{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;}

/* ── OVERLAY ── */
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:99;}
#sidebar-overlay.show{display:block;}

/* ── SUNDAY BANNER ── */
.sunday-banner{display:none;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--gold-dim);border-radius:8px;padding:11px 14px;margin-bottom:16px;}
.sunday-banner.show{display:flex;}
.sunday-banner .sb-text{font-size:0.72rem;color:var(--soft);line-height:1.5;flex:1;}
.sunday-banner .sb-text strong{color:var(--gold);display:block;}

/* ── FORMS ── */
input[type="date"],input[type="text"],input[type="number"],select,textarea{width:100%;padding:6px 8px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:4px;font-family:var(--font-m);font-size:0.73rem;margin-bottom:6px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--gold);background:var(--surface3);}
button{cursor:pointer;transition:all 0.15s;}
.btn{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.73rem;padding:6px 12px;}
.btn:hover{background:var(--surface3);color:var(--text);}
.btn-gold{background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);font-family:var(--font-m);font-size:0.73rem;padding:6px 12px;border-radius:6px;}
.btn-gold:hover{background:var(--gold);color:var(--bg);}
.btn-x{background:none;border:none;color:var(--muted);padding:4px;font-size:0.8rem;cursor:pointer;}
.btn-x:hover{color:var(--red);}

/* ── MODAL ── */
#edit-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:200;align-items:center;justify-content:center;}
.modal-content{background:var(--surface);border:1px solid var(--border2);border-radius:8px;padding:20px;width:90%;max-width:400px;max-height:80vh;overflow-y:auto;}
.modal-content h3{font-family:var(--font-h);font-size:0.9rem;font-weight:700;margin-bottom:14px;color:var(--text);}
.lbl{font-size:0.7rem;color:var(--soft);display:block;margin-bottom:4px;}
.del-confirm{font-size:0.72rem;color:var(--soft);display:flex;gap:8px;align-items:center;}
.del-yes,.del-no{background:none;border:none;color:var(--gold);font-family:var(--font-m);font-size:0.65rem;cursor:pointer;padding:2px 4px;}
.del-no{color:var(--soft);}

/* ── RESPONSIVE ── */
@media(max-width:900px){
  .sidebar{transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .main{margin-left:0;}
  .topbar{padding:12px 16px;}
  .content{padding:16px;}
  .page-title{font-size:0.9rem;}
  #install-btn{display:none!important;}
}

@media(min-width:901px) and (max-width:1200px){
  .ga{grid-template-columns:1fr 1fr;}
}

.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:12px 16px;font-size:0.7rem;color:var(--soft);z-index:300;animation:slideIn 0.3s;}
@keyframes slideIn{from{transform:translateY(20px);opacity:0;}to{transform:translateY(0);opacity:1;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-logo">JE<span>.</span></div>
    <div class="auth-sub">Personal Operating System</div>
    <div class="auth-card">
      <h2>Sign in</h2>
      <p>Syncs across all devices in real time.</p>
      <button class="btn-google" onclick="window.doSignIn()">
        <svg width="15" height="15" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Continue with Google
      </button>
      <div id="auth-err"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="app-layout">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo">JE<span>.</span></div>
        <div class="logo-sub">Personal OS</div>
      </div>
      <div class="sidebar-user" onclick="window.doSignOut()">
        <img id="uav" class="uav" src="" onerror="this.style.display='none'">
        <span id="uname" class="uname">—</span>
        <div class="sync-dot" id="sync-status"></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section">
          <div class="nav-section-label">Daily</div>
          <div class="nav-item active" onclick="nav('today')">
            <span class="ni-icon">📅</span>
            <span class="ni-label">Today</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Weekly</div>
          <div class="nav-item" onclick="nav('review')">
            <span class="ni-icon">📊</span>
            <span class="ni-label">Review</span>
          </div>
          <div class="nav-item" onclick="nav('energy')">
            <span class="ni-icon">⚡</span>
            <span class="ni-label">Energy Map</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Projects</div>
          <div class="nav-item" onclick="nav('padel')">
            <span class="ni-icon">🎾</span>
            <span class="ni-label">Padel</span>
          </div>
          <div class="nav-item" onclick="nav('uni')">
            <span class="ni-icon">📚</span>
            <span class="ni-label">Uni Log</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Reflect</div>
          <div class="nav-item" onclick="nav('journal')">
            <span class="ni-icon">✍</span>
            <span class="ni-label">Journal</span>
          </div>
          <div class="nav-item" onclick="nav('priorities')">
            <span class="ni-icon">⭐</span>
            <span class="ni-label">Priorities</span>
          </div>
        </div>
        <div class="nav-section">
          <div class="nav-section-label">Data</div>
          <div class="nav-item" onclick="nav('stats')">
            <span class="ni-icon">📈</span>
            <span class="ni-label">Stats</span>
          </div>
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="streak-pill">
          <div class="streak-num" id="main-streak">0</div>
          <div class="streak-info">Day<br><strong>Streak</strong></div>
        </div>
        <div class="streak-pill" style="background:var(--surface2);border-color:var(--border2);position:relative;">
          <div class="streak-num" style="color:var(--gold);" id="read-streak">0</div>
          <div class="streak-info">Reading<br><strong>Days</strong></div>
          <button onclick="resetReadingStreak()" style="position:absolute;top:4px;right:4px;background:none;border:none;color:var(--muted);font-size:0.7rem;cursor:pointer;padding:2px 4px;border-radius:2px;transition:all 0.15s;" title="Reset streak" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">↻</button>
        </div>
        <button class="btn" onclick="window.doExportAll()" style="width:100%;">⬇ Export</button>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div class="topbar-left">
          <button class="hamburger" onclick="toggleSidebar()">☰</button>
          <h1 class="page-title" id="page-title">Today</h1>
        </div>
        <div class="topbar-right">
          <button id="yesterday-btn" onclick="toggleYesterday()" style="background:none;border:1px solid var(--border2);border-radius:6px;color:var(--soft);font-family:var(--font-m);font-size:0.65rem;padding:4px 8px;cursor:pointer;transition:all 0.15s;">←</button>
          <div class="date-pill"><strong id="top-date">—</strong><span id="top-time">—</span></div>
          <button id="install-btn" onclick="window.installPWA()">Install</button>
        </div>
      </div>
      <div class="content" id="content"></div>
    </main>

  </div>
</div>

<!-- MODAL -->
<div id="edit-modal">
  <div class="modal-content">
    <h3 id="edit-modal-title">Edit</h3>
    <div id="edit-modal-fields"></div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="btn-gold" onclick="window.saveEdit()">Save</button>
      <button class="btn" onclick="window.closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, addDoc, getDocs, deleteDoc, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// 🔧 FIREBASE CONFIG
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyB5QdQaXq72UNK1oCRDfZPZHm2-31LBsz0",
  authDomain: "joelos.firebaseapp.com",
  projectId: "joelos",
  storageBucket: "joelos.firebasestorage.app",
  messagingSenderId: "571313050682",
  appId: "1:571313050682:web:fadbacf90a567891891103"
};
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const LIVE = FIREBASE_CONFIG.apiKey !== "PASTE_HERE";
let auth, db, uid = null;
const C = {};
let currentPage = 'today';
let editState = { col: null, id: null, fields: [] };
let viewingYesterday = false;

if (LIVE) {
  const app = initializeApp(FIREBASE_CONFIG);
  auth = getAuth(app);
  db = getFirestore(app);
} else {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  boot(null);
}

// PWA
const manifest = {
  name: 'JE OS', short_name: 'JE OS', start_url: '/JoelOS/', display: 'standalone',
  background_color: '#080808', theme_color: '#080808',
  icons: [{ src: 'https://placehold.co/192x192/080808/c8a96e?text=JE', sizes: '192x192', type: 'image/png' }]
};
const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
document.getElementById('pwa-manifest').href = URL.createObjectURL(blob);
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-btn').style.display = 'block'; });
window.installPWA = async () => { if (!deferredPrompt) return; deferredPrompt.prompt(); await deferredPrompt.userChoice; document.getElementById('install-btn').style.display = 'none'; deferredPrompt = null; };

// ── GLOBAL WINDOW FUNCTIONS ──────────────
window.doSignIn = async () => {
  document.getElementById('auth-err').textContent = '';
  try {
    await signInWithPopup(auth, new GoogleAuthProvider());
  } catch (e) {
    document.getElementById('auth-err').textContent = e.message;
  }
};

window.doSignOut = async () => {
  if (!LIVE) return;
  if (confirm('Sign out?')) await signOut(auth);
};

if (LIVE) {
  onAuthStateChanged(auth, u => {
    if (u) {
      uid = u.uid;
      const av = document.getElementById('uav');
      if (u.photoURL) { av.src = u.photoURL; av.style.display = 'block'; }
      document.getElementById('uname').textContent = u.displayName || u.email;
      document.getElementById('auth-screen').style.display = 'none';

      boot(u);
    } else {
      uid = null;
      document.getElementById('auth-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  });
}

// ── FIRESTORE HELPERS ────────────────────
const up = path => uid ? `users/${uid}/${path}` : path;
const todayKey = () => new Date().toISOString().slice(0, 10);
const weekKey = () => { const d = new Date(); const day = d.getDay() || 7; d.setDate(d.getDate() - day + 1); return d.toISOString().slice(0, 10); };

async function fsGet(path) { if (!LIVE) return null; try { const snap = await getDoc(doc(db, path)); return snap.exists() ? snap.data() : null; } catch (e) { console.error('fsGet error:', e.code, e.message); return null; } }
async function fsSet(path, data) { if (!LIVE) return; try { await setDoc(doc(db, path), data, { merge: true }); syncPulse(); } catch (e) { console.error('fsSet error:', e.code, e.message); } }
async function fsColGet(path) { if (!LIVE) return []; try { const q = query(collection(db, path), orderBy('date', 'desc')); const snap = await getDocs(q); return snap.docs.map(d => ({ id: d.id, ...d.data() })); } catch (e) { console.error('fsColGet error:', e.code, e.message); return []; } }
async function fsColAdd(path, data) { if (!LIVE) return; try { data.date = data.date || todayKey(); await addDoc(collection(db, path), data); syncPulse(); } catch (e) { console.error('fsColAdd error:', e.code, e.message); } }
async function fsColDel(path, id) { if (!LIVE) return; try { await deleteDoc(doc(db, path, id)); syncPulse(); } catch (e) { console.error('fsColDel error:', e.code, e.message); } }

function syncPulse() { const el = document.getElementById('sync-status'); el.classList.add('syncing'); setTimeout(() => { el.classList.remove('syncing'); el.classList.add('synced'); setTimeout(() => el.classList.remove('synced'), 1000); }, 500); }

// ── UI HELPERS ───────────────────────────
function toast(msg) { const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
function todayKey2() { return new Date().toISOString().slice(0, 10); }
function isSunday() { return new Date().getDay() === 0; }
function fmtDate(d) { return new Date(d + 'T00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }); }
function mLbl(m) { return new Date(`${m}-01`).toLocaleDateString('en-GB', { month: 'short' }); }

async function renderTodayData(data) {
  // Update reading display
  const readData = data.reading ? `<div>${data.reading.title} • ${data.reading.pages}p • ${data.reading.mins}m</div>` : '<div class="empty">No reading logged yet</div>';
  document.getElementById('read-display').innerHTML = readData;
  if (data.reading) {
    document.getElementById('read-title').value = data.reading.title || '';
    document.getElementById('read-pages').value = data.reading.pages || '';
    document.getElementById('read-mins').value = data.reading.mins || '';
  }

  // Populate reading title autocomplete
  const allDaily = await fsColGet(up('daily')) || [];
  const uniqueTitles = [...new Set(allDaily.filter(d => d.reading?.title).map(d => d.reading.title))];
  const datalist = document.getElementById('reading-history');
  if (datalist) {
    datalist.innerHTML = uniqueTitles.map(t => `<option value="${t}"></option>`).join('');
  }

  // Populate mood trigger field
  if (data.mood_trigger) {
    document.getElementById('mood-trigger').value = data.mood_trigger;
  }

  // Update wins
  const winsHtml = (data.wins || []).map((w, i) => `<div style="padding:6px;background:var(--surface2);border-radius:4px;font-size:0.7rem;display:flex;justify-content:space-between;align-items:center;"><span>${w}</span><button class="btn-x" onclick="delWin(${i})">✕</button></div>`).join('');
  document.getElementById('wins-display').innerHTML = winsHtml || '<div class="empty">No wins yet — every action counts</div>';

  // Update resistance
  const resistHtml = (data.resistance || []).map((r, i) => `<div style="padding:6px;background:var(--surface2);border-radius:4px;font-size:0.7rem;display:flex;justify-content:space-between;align-items:center;"><span>${r}</span><button class="btn-x" onclick="delResist(${i})">✕</button></div>`).join('');
  document.getElementById('resist-display').innerHTML = resistHtml || '<div class="empty">What you avoid reveals what you need</div>';

  if (data.gratitude) document.getElementById('grat-input').value = data.gratitude;
  if (data.journal) document.getElementById('daily-journal').value = data.journal;

  // RPE slider listener
  const rpeSlider = document.getElementById('gym-rpe');
  if (rpeSlider) {
    rpeSlider.addEventListener('change', saveGymRPE);
    rpeSlider.addEventListener('input', (e) => {
      document.getElementById('rpe-display').textContent = e.target.value;
    });
  }
}

    typeMatch.style.background = 'var(--surface2)';
    typeMatch.style.borderColor = 'var(--border2)';
    typeMatch.style.color = 'var(--soft)';

    return;
  }
  
  const wins = matches.filter(m => m.result === 'win').length;
  const losses = matches.filter(m => m.result === 'loss').length;
  const opponents = {};
  
  matches.forEach(m => {
    if (!opponents[m.opponent]) opponents[m.opponent] = { wins: 0, losses: 0 };
    if (m.result === 'win') opponents[m.opponent].wins++;
    else if (m.result === 'loss') opponents[m.opponent].losses++;
  });
  
  let html = `<div style="margin-bottom:8px;"><strong>${wins}-${losses}</strong> record</div>`;
  html += '<div style="font-size:0.7rem;color:var(--soft);">';
  Object.entries(opponents).forEach(([opp, stats]) => {
    const oppRecord = `${stats.wins}-${stats.losses}`;
    html += `<div style="padding:4px 0;border-bottom:1px solid var(--border);">${opp}: ${oppRecord}</div>`;
  });
  html += '</div>';
  
  document.getElementById('match-stats').innerHTML = html;
}

async function renderGymChart() {
  const cols = { push: 'var(--gold)', pull: 'var(--green)', legs: 'var(--blue)' };
  let data = {};
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const m = d.toISOString().slice(0, 7);
    months.push(m);
    data[m] = { push: 0, pull: 0, legs: 0 };
  }
  const sessions = await fsColGet(up('gym_sessions')) || [];
  sessions.forEach(s => {
    const m = s.date?.slice(0, 7);
    if (data[m]) data[m] = { ...data[m], ...s };
  });

  const el = document.getElementById('gym-stats-chart');
  el.innerHTML = months.map(m => {
    const bars = Object.entries(data[m] || {}).map(([type, val]) => {
      const h = Math.max(1, val * 4);
      return `<div style="flex:1;height:${h}px;background:${cols[type]};border-radius:1px;"></div>`;
    }).join('');
    return `<div style="flex:1;min-width:0;"><div style="display:flex;gap:1px;align-items:flex-end;height:60px;">${bars}</div><div style="font-size:0.56rem;color:var(--muted);text-align:center;margin-top:4px;">${mLbl(m)}</div></div>`;
  }).join('');
}

async function renderPdChart() {
  const months = [];
  const now = new Date();
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push(d.toISOString().slice(0, 7));
  }
  const sessions = await fsColGet(up('padel'));
  const counts = {};
  months.forEach(m => counts[m] = 0);
  sessions.forEach(s => {
    const m = s.date?.slice(0, 7);
    if (counts[m] !== undefined) counts[m]++;
  });
  const maxV = Math.max(1, ...Object.values(counts));
  const el = document.getElementById('pd-stats-chart');
  el.innerHTML = months.map(m => barHtml(mLbl(m), counts[m], maxV, 'var(--green)')).join('');
}

async function renderMoodHm() {

async function renderPhoneChart() {
  const items = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    const mins = v?.phone?.mins ?? null;
    const hrs = mins !== null ? mins / 60 : null;
    items.push({ label: new Date(k + 'T00:00:00').toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }), val: hrs });
  }
  const maxV = Math.max(1, ...items.filter(i => i.val !== null).map(i => i.val), 8);
  const el = document.getElementById('phone-chart');
  el.innerHTML = items.filter(i => i.val !== null).map(i => {
    const color = i.val <= 4 ? 'var(--green)' : i.val <= 6 ? 'var(--gold)' : 'var(--red)';
    return barHtml(i.label, i.val, maxV, color);
  }).join('') || '<div class="empty">No phone usage logged yet</div>';
}

async function renderReadingStats() {
  let tp = 0, tm = 0, days = 0;
  for (let i = 0; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.reading) { tp += v.reading.pages || 0; tm += v.reading.mins || 0; days++; }
  }
  document.getElementById('st-pages').textContent = tp;
  document.getElementById('st-mins').textContent = tm;
  document.getElementById('st-days').textContent = days;
}

async function renderRevChart() {
  const weeks = [];
  for (let i = 7; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - (i * 7));
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    weeks.push(d.toISOString().slice(0, 10));
  }
  const reviews = await Promise.all(weeks.map(w => fsGet(up(`reviews/${w}`)).then(r => r ? { wk: w, ...r } : null)));
  const valid = reviews.filter(Boolean);
  const el = document.getElementById('rev-chart');
  el.innerHTML = valid.length ? valid.map(r => {
    const areas = ['Professional', 'Health', 'Personal', 'Relationships', 'Learning'];
    const avg = areas.reduce((s, a) => s + (r.scores?.[a] || 0), 0) / areas.length;
    return barHtml(fmtDate(r.wk), parseFloat(avg.toFixed(1)), 10, 'var(--gold)');
  }).join('') : '<div class="empty">No review scores yet</div>';
}

async function renderResistChart() {
  const items = [];
  for (let i = 0; i < 30; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.resistance) items.push(...v.resistance);
  }
  const el = document.getElementById('resist-chart');
  el.innerHTML = items.length ? items.slice(-12).reverse().map(r => `<div style="font-size:0.72rem;color:var(--soft);padding:5px 0;border-bottom:1px solid var(--border);">→ ${r}</div>`).join('') : '<div class="empty">No resistance logged yet — patterns appear here over time</div>';
}

}

function renderPriorityArchive(archive) {
  if (!archive || Object.keys(archive).length === 0) {
    document.getElementById('p-archive').innerHTML = '<div class="empty">No completed priorities yet</div>';
    return;
  }
  
  const weeks = Object.keys(archive).sort().reverse();
  let html = '';
  
  weeks.forEach(wk => {
    const items = archive[wk] || [];
    const completed = items.length;
    const pct = completed > 0 ? '✓ ' : '○ ';
    
    html += `
    <div style="padding:8px;background:var(--surface2);border-radius:4px;margin-bottom:6px;">
      <div style="font-size:0.65rem;color:var(--muted);margin-bottom:4px;">${pct}Week of ${wk} — ${completed} completed</div>
      <div style="font-size:0.7rem;color:var(--soft);">
        ${items.map(p => `<div style="margin:2px 0;">• ${p.text}</div>`).join('')}
      </div>
    </div>
    `;
  });
  
  document.getElementById('p-archive').innerHTML = html;
}

window.openEditModal = (title, col, id, fields) => {

  document.getElementById('edit-modal-fields').innerHTML = fields.map(f => `
    <div style="margin-bottom:10px;">

      ${f.type === 'textarea' ? `<textarea id="ef-${f.key}" rows="${f.rows || 3}">${f.value || ''}</textarea>` : `<input type="${f.type || 'text'}" id="ef-${f.key}" value="${(f.value || '').replace(/"/g, '&quot;')}">`}
    </div>`).join('');
  document.getElementById('edit-modal').style.display = 'flex';
};

window.closeEditModal = () => {
  document.getElementById('edit-modal').style.display = 'none';
  editState = { col: null, id: null, fields: [] };
};

window.saveEdit = async () => {
  if (!editState.col || !editState.id) return;
  const updates = {};
  editState.fields.forEach(f => {
    const el = document.getElementById('ef-' + f.key);
    if (el) updates[f.key] = el.value;
  });
  const items = await fsColGet(up(editState.col));
  const item = items.find(i => i.id === editState.id);
  if (!item) { toast('Entry not found'); return; }
  const updated = { ...item, ...updates };
  await fsColDel(up(editState.col), editState.id);
  await fsColAdd(up(editState.col), updated);
  window.closeEditModal();
  toast('Saved');
  const renders = { padel: renderPadelPage, journal: renderJournalPage, uni_log: renderUniPage };
  const col = editState.col.split('/').pop();
  renders[col]?.();
};

// ── EXPORT ALL ──────────────────────────
window.doExportAll = async () => {
  if (!LIVE || !uid) { toast('Sign in first to export'); return; }
  toast('Preparing export...');
  const data = { exported: new Date().toISOString(), uid };
  const cols = ['padel', 'journal', 'uni_log'];
  for (const col of cols) { data[col] = await fsColGet(up(col)); }
  data.daily = {};
  for (let i = 0; i < 365; i++) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v) data.daily[k] = v;
  }
  data.weeks = {};
  data.reviews = {};
  data.energy_map = {};
  for (let i = 0; i < 52; i++) {
    const d = new Date();
    d.setDate(d.getDate() - (i * 7));
    const day = d.getDay() || 7;
    d.setDate(d.getDate() - day + 1);
    const wk = d.toISOString().slice(0, 10);
    const w = await fsGet(up(`weeks/${wk}`));
    if (w) data.weeks[wk] = w;
    const r = await fsGet(up(`reviews/${wk}`));
    if (r) data.reviews[wk] = r;
    const e = await fsGet(up(`energy_map/${wk}`));
    if (e) data.energy_map[wk] = e;
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `je-os-backup-${new Date().toISOString().slice(0, 10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Export downloaded');
};

async function updateReadingStreak() {
  let streak = 0;
  const today = new Date();
  
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.reading?.pages > 0 || v?.reading?.mins > 0) {
      streak++;
    } else if (i > 0) {
      break;
    }
  }
  
  document.getElementById('read-streak').textContent = streak;
}

async function resetReadingStreak() {
  if (!confirm('Reset reading streak? This cannot be undone.')) return;
  // Clear all reading entries in past 365 days
  const today = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0, 10);
    const v = await fsGet(up(`daily/${k}`));
    if (v?.reading) {
      delete v.reading;
      await fsSet(up(`daily/${k}`), v);
    }
  }
  await updateReadingStreak();
}
